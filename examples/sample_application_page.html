<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sample Application Page</title>
  </head>
  <body>
    <form>
      <label for="full-name">Full name</label>
      <input id="full-name" name="candidate_name" type="text">

      <label for="email">Email address</label>
      <input id="email" name="email" type="email">

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel">

      <label for="resume">Upload CV or resume</label>
      <input id="resume" name="resume_file" type="file">

      <label for="cover-letter">Cover letter</label>
      <textarea id="cover-letter" name="cover_letter"></textarea>

      <label for="work-auth">Work authorization</label>
      <select id="work-auth" name="work_authorization"></select>

      <button type="submit">Submit application</button>
    </form>
  </body>
</html>
